      description = "MITOS Space 是 MITOS CO., LTD. 旗下的太空與天文研究部門。"

      [languages.zh-tw.params.homeInfoParams]
        Title = "MITOS Space"
        Content = "MITOS Space 是 MITOS CO., LTD. 旗下的太空與天文研究部門，結合科學研究、教育與科學傳播。我們從事並支援天文學研究，製作教育內容，並向更廣泛的受眾傳播科學發現，特別聚焦於太空科學、天文學及相關科學研究領域。"
