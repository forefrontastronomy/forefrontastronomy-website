[languages]

  [languages.en]
    languageName = "English"
    languageCode = "en"
    contentDir = "content/en"
    weight = 1
    title = "MITOS Space"

    [languages.en.params]
      description = "MITOS Space is the space and astronomy research division of MITOS CO., LTD."

      [languages.en.params.homeInfoParams]
        Title = "MITOS Space"
        Content = "MITOS Space is the space and astronomy research division of MITOS CO., LTD., integrating scientific research, education, and science communication. We conduct and support astronomical research, develop educational content, and communicate scientific discoveries to broader audiences, with a particular focus on space science, astronomy, and related fields of scientific research."

  [languages.zh-tw]
